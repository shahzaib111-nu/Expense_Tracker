<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Account · Expense Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Inter", sans-serif;
      }
    </style>
  </head>
  <body
    class="min-h-screen bg-gradient-to-br from-emerald-50 via-white to-emerald-100 flex items-center justify-center p-4"
  >
    <div class="w-full max-w-md">
      <!-- Logo / Brand -->
      <div class="flex flex-col items-center mb-6">
        <div
          class="w-12 h-12 rounded-xl bg-emerald-600 flex items-center justify-center text-white text-2xl font-bold shadow-lg shadow-emerald-200 mb-3"
        >
          ₨
        </div>
        <h1 class="text-2xl font-extrabold text-slate-800">Expense Tracker</h1>
        <p class="text-sm text-slate-500 mt-1">
          Create your account to get started
        </p>
      </div>

      <!-- Card -->
      <div
        class="bg-white rounded-2xl shadow-xl shadow-slate-200 border border-slate-100 p-8"
      >
        <h2 class="text-xl font-bold text-slate-800 mb-1">Sign up</h2>
        <p class="text-sm text-slate-500 mb-6">
          Track your spending, one entry at a time.
        </p>

        <form id="registerForm" class="space-y-5">
          <!-- Full Name -->
          <div>
            <label
              for="fullName"
              class="block text-sm font-medium text-slate-700 mb-1.5"
              >Full Name</label
            >
            <input
              type="text"
              id="fullName"
              name="fullName"
              placeholder="John Doe"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-slate-300 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
            />
          </div>

          <!-- Email -->
          <div>
            <label
              for="email"
              class="block text-sm font-medium text-slate-700 mb-1.5"
              >Email</label
            >
            <input
              type="email"
              id="email"
              name="email"
              placeholder="you@example.com"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-slate-300 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              for="password"
              class="block text-sm font-medium text-slate-700 mb-1.5"
              >Password</label
            >
            <input
              type="password"
              id="password"
              name="password"
              placeholder="At least 8 characters"
              minlength="8"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-slate-300 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
            />
          </div>

          <!-- Confirm Password -->
          <div>
            <label
              for="confirmPassword"
              class="block text-sm font-medium text-slate-700 mb-1.5"
              >Confirm Password</label
            >
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Re-enter your password"
              minlength="8"
              required
              class="w-full px-4 py-2.5 rounded-lg border border-slate-300 text-slate-800 placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 transition"
            />
            <p id="matchError" class="hidden text-xs text-red-500 mt-1.5">
              Passwords do not match.
            </p>
          </div>

          <!-- Submit -->
          <button
            type="submit"
            id="submitBtn"
            class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-2.5 rounded-lg transition shadow-md shadow-emerald-200"
          >
            Create Account
          </button>

          <!-- Loading message -->
          <p id="loadingMsg" class="hidden text-sm text-slate-600 text-center">
            Creating your account...
          </p>
        </form>

        <!-- Navigation link -->
        <p class="text-sm text-slate-500 text-center mt-6">
          Already have an account?
          <a
            href="login.html"
            class="text-emerald-600 font-semibold hover:underline"
            >Log in</a
          >
        </p>
      </div>
    </div>

<script>
  const registerForm = document.getElementById("registerForm");
  const matchError = document.getElementById("matchError");
  const submitBtn = document.getElementById("submitBtn");
  const loadingMsg = document.getElementById("loadingMsg");

  registerForm.addEventListener("submit", async function (e) {
    e.preventDefault();

    const fullName = document.getElementById("fullName").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const confirmPassword = document.getElementById("confirmPassword").value;

    if (password !== confirmPassword) {
      matchError.classList.remove("hidden");
      return;
    }

    matchError.classList.add("hidden");

    // Disable submit button and show loading
    submitBtn.disabled = true;
    loadingMsg.classList.remove("hidden");

    try {
      const response = await fetch("http://localhost:8080/api/auth/register", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
        },
        body: JSON.stringify({
          name: fullName,
          email: email,
          password: password,
        }),
      });

      const data = await response.json();

      if (response.ok) {
        alert("Registration successful! You can now log in.");
        registerForm.reset();
        console.log("Registration response:", data);
      } else {
        alert(data.message || "Registration failed!");
        console.error("Registration error:", data);
      }
    } catch (error) {
      console.error("Error:", error);
      alert("Unable to connect to the server. Make sure the backend is running on http://localhost:8080");
    } finally {
      // Re-enable submit button and hide loading
      submitBtn.disabled = false;
      loadingMsg.classList.add("hidden");
    }
  });
</script>
  </body>
</html>
